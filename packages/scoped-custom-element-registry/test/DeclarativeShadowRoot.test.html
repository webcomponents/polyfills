<html>
  <body>
    <script>
      window.CustomElementRegistryPolyfill = {
        force: true,
      };
    </script>
    <script src="../scoped-custom-element-registry.min.js"></script>
    <div id="host1">
      <template shadowrootmode="open">
        <dsd-element></dsd-element>
      </template>
    </div>
    <div id="host2" polyfill-shadowrootcustomelementregistry>
      <!-- note, cannot use native attribute here if browser has native support -->
      <template shadowrootmode="open">
        <dsd-element></dsd-element>
      </template>
    </div>
    <script type="module">
      import {runTests} from '@web/test-runner-mocha';

      customElements.define(
        'dsd-element',
        class extends HTMLElement {
          constructor() {
            super();
            this.attachShadow({
              mode: 'open',
            }).innerHTML = `${this.localName}: global`;
          }
        }
      );

      runTests(async () => import('./DeclarativeShadowRoot.test.html.js'));
    </script>
  </body>
</html>
